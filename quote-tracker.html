<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TEG Quote Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{font-size:15px;font-weight:600;color:#1a1a1a;letter-spacing:-.01em}
.topbar-logo span{color:#4f46e5}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid #e5e5e3;color:#666;background:#fafafa}
.status-pill.connected{border-color:#bbf7d0;background:#f0fdf4;color:#166534}
.status-pill.error{border-color:#fecaca;background:#fef2f2;color:#991b1b}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}
.spinner{width:10px;height:10px;border:2px solid #ccc;border-top-color:#666;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.main{max-width:1100px;margin:0 auto;padding:28px 24px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:22px;font-weight:600;color:#1a1a1a}
.page-subtitle{font-size:13px;color:#888;margin-top:2px}
.header-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #e5e5e3;background:#fff;color:#1a1a1a;cursor:pointer;transition:all .15s}
.btn:hover{background:#f5f5f3;border-color:#ccc}
.btn-primary{background:#4f46e5;border-color:#4f46e5;color:#fff}
.btn-primary:hover{background:#4338ca;border-color:#4338ca}
.btn-sm{padding:5px 10px;font-size:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:16px}
.stat-label{font-size:12px;color:#888;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:600;color:#1a1a1a}
.stat-value.red{color:#dc2626}
.stat-value.amber{color:#d97706}
.stat-value.green{color:#16a34a}
.stat-value.indigo{color:#4f46e5}
.columns{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.col-wrap{}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#888}
.col-badge{background:#f0f0ee;border-radius:99px;padding:2px 8px;font-size:11px;color:#888}
.card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
.card:hover{border-color:#ccc}
.card.overdue{border-left:3px solid #dc2626;border-radius:0 10px 10px 0}
.card.due-soon{border-left:3px solid #d97706;border-radius:0 10px 10px 0}
.card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.card-company{font-size:14px;font-weight:600;color:#1a1a1a}
.card-contact{font-size:12px;color:#888;margin-top:1px}
.pill{font-size:11px;padding:3px 8px;border-radius:99px;white-space:nowrap;font-weight:500}
.pill-red{background:#fef2f2;color:#991b1b}
.pill-amber{background:#fffbeb;color:#92400e}
.pill-green{background:#f0fdf4;color:#166534}
.pill-blue{background:#eff6ff;color:#1e40af}
.pill-indigo{background:#eef2ff;color:#3730a3}
.card-notes{font-size:12px;color:#888;margin:6px 0;line-height:1.4}
.card-meta{display:flex;align-items:center;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0ee;flex-wrap:wrap}
.meta{display:flex;align-items:center;gap:4px;font-size:11px;color:#aaa}
.meta i{font-size:13px}
.gh-link{font-size:11px;color:#aaa;text-decoration:none;display:flex;align-items:center;gap:3px;margin-left:auto}
.gh-link:hover{color:#4f46e5}
.card-actions{display:flex;gap:6px;margin-top:10px}
.act-btn{flex:1;background:#fafafa;border:1px solid #e5e5e3;border-radius:7px;padding:5px 8px;font-size:11px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.act-btn:hover{background:#f0f0ee;color:#1a1a1a;border-color:#ccc}
.empty{font-size:12px;color:#bbb;padding:12px 0;text-align:center}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;width:460px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h2{font-size:17px;font-weight:600;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:8px 12px;font-size:13px;border:1px solid #e5e5e3;border-radius:7px;outline:none;font-family:inherit;background:#fff;color:#1a1a1a}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:200;display:none;align-items:center;gap:8px}
.toast.show{display:flex}
.toast.success{background:#166534}
.toast.error{background:#991b1b}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}.columns{grid-template-columns:1fr}.main{padding:16px}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">TEG <span>Quotes</span></div>
  </div>
  <div id="status-pill" class="status-pill"><span class="spinner"></span>&nbsp;Connecting...</div>
</div>

<div class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Quote tracker</div>
      <div class="page-subtitle">Synced with github.com/mmtoscano42/teg-quotes</div>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="doRefresh()"><i class="ti ti-refresh"></i> Refresh</button>
      <button class="btn btn-primary" onclick="openModal(null)"><i class="ti ti-plus"></i> Add deal</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total deals</div><div class="stat-value indigo" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Overdue</div><div class="stat-value red" id="s-overdue">—</div></div>
    <div class="stat"><div class="stat-label">Due in 3 days</div><div class="stat-value amber" id="s-soon">—</div></div>
    <div class="stat"><div class="stat-label">Quotes received</div><div class="stat-value green" id="s-recv">—</div></div>
  </div>

  <div class="columns">
    <div class="col-wrap">
      <div class="col-head"><span class="col-title">Awaiting quote</span><span class="col-badge" id="c-pending">0</span></div>
      <div id="col-pending"></div>
    </div>
    <div class="col-wrap">
      <div class="col-head"><span class="col-title">Quote received</span><span class="col-badge" id="c-recv">0</span></div>
      <div id="col-recv"></div>
    </div>
    <div class="col-wrap">
      <div class="col-head"><span class="col-title">Closed</span><span class="col-badge" id="c-closed">0</span></div>
      <div id="col-closed"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal-box"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const OWNER='mmtoscano42';
const REPO='teg-quotes';
const TOKEN='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';
const API='https://api.github.com';

const today=new Date();today.setHours(0,0,0,0);
function daysUntil(ds){if(!ds)return 999;const d=new Date(ds);d.setHours(0,0,0,0);return Math.round((d-today)/864e5);}

async function gh(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok)throw new Error('GitHub '+r.status+': '+r.statusText);
  if(r.status===204)return null;
  return r.json();
}

function parseIssue(i){
  const b=i.body||'';
  const g=k=>{const m=b.match(new RegExp(k+':\\s*(.+)'));return m?m[1].trim():'';};
  const lbls=i.labels.map(l=>l.name);
  let status='pending';
  if(lbls.includes('closed'))status='closed';
  else if(lbls.includes('quote-received'))status='quote-received';
  return{id:i.number,ghNumber:i.number,company:i.title,contact:g('Contact'),email:g('Email'),service:g('Service'),dueDate:g('Due'),notes:g('Notes'),status};
}

async function ensureLabels(){
  let existing=[];
  try{existing=await gh(`/repos/${OWNER}/${REPO}/labels`);}catch(e){}
  const names=existing.map(l=>l.name);
  const needed=[{name:'awaiting-quote',color:'f59e0b'},{name:'quote-received',color:'3b82f6'},{name:'closed',color:'22c55e'}];
  for(const l of needed){
    if(!names.includes(l.name))await gh(`/repos/${OWNER}/${REPO}/labels`,{method:'POST',body:JSON.stringify(l)}).catch(()=>{});
  }
}

async function loadDeals(){
  const issues=await gh(`/repos/${OWNER}/${REPO}/issues?state=all&per_page=100`);
  return issues.filter(i=>!i.pull_request).map(parseIssue);
}

async function createDeal(d){
  const body=`Contact: ${d.contact}\nEmail: ${d.email||''}\nService: ${d.service||''}\nDue: ${d.dueDate||''}\nNotes: ${d.notes||''}`;
  const issue=await gh(`/repos/${OWNER}/${REPO}/issues`,{method:'POST',body:JSON.stringify({title:d.company,body,labels:['awaiting-quote']})});
  return parseIssue(issue);
}

async function setStatus(ghNum,newStatus){
  const map={pending:'awaiting-quote','quote-received':'quote-received',closed:'closed'};
  for(const l of['awaiting-quote','quote-received','closed']){
    await gh(`/repos/${OWNER}/${REPO}/issues/${ghNum}/labels/${l}`,{method:'DELETE'}).catch(()=>{});
  }
  await gh(`/repos/${OWNER}/${REPO}/issues/${ghNum}/labels`,{method:'POST',body:JSON.stringify({labels:[map[newStatus]]})});
  if(newStatus==='closed')await gh(`/repos/${OWNER}/${REPO}/issues/${ghNum}`,{method:'PATCH',body:JSON.stringify({state:'closed'})});
  else await gh(`/repos/${OWNER}/${REPO}/issues/${ghNum}`,{method:'PATCH',body:JSON.stringify({state:'open'})});
}

async function updateIssue(ghNum,d){
  const body=`Contact: ${d.contact}\nEmail: ${d.email||''}\nService: ${d.service||''}\nDue: ${d.dueDate||''}\nNotes: ${d.notes||''}`;
  await gh(`/repos/${OWNER}/${REPO}/issues/${ghNum}`,{method:'PATCH',body:JSON.stringify({title:d.company,body})});
}

let deals=[];
let editingId=null;

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>t.className='toast',3000);
}

function setStatusPill(msg,state=''){
  const p=document.getElementById('status-pill');
  p.className='status-pill '+(state||'');
  p.innerHTML=state==='connected'?`<span class="status-dot"></span> ${msg}`:state==='error'?`<i class="ti ti-alert-circle" style="font-size:13px"></i> ${msg}`:`<span class="spinner"></span>&nbsp;${msg}`;
}

function urgencyPill(d){
  if(d.status!=='pending')return '';
  const n=daysUntil(d.dueDate);
  if(n<0)return `<span class="pill pill-red">${Math.abs(n)}d overdue</span>`;
  if(n<=3)return `<span class="pill pill-amber">${n}d left</span>`;
  return `<span class="pill pill-green">${n}d left</span>`;
}

function renderCard(d){
  const dl=d.dueDate?new Date(d.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'}):'—';
  let badge='';
  if(d.status==='quote-received')badge='<span class="pill pill-blue">Quote in</span>';
  else if(d.status==='closed')badge='<span class="pill pill-indigo">Closed</span>';
  else badge=urgencyPill(d);
  const cls=d.status!=='pending'?'card':daysUntil(d.dueDate)<0?'card overdue':daysUntil(d.dueDate)<=3?'card due-soon':'card';
  let acts='';
  if(d.status==='pending'){
    acts=`<div class="card-actions">
      <button class="act-btn" onclick="doReceived(${d.id})"><i class="ti ti-circle-check"></i> Mark received</button>
      <button class="act-btn" onclick="openModal(${d.id})"><i class="ti ti-edit"></i> Edit</button>
    </div>`;
  }else if(d.status==='quote-received'){
    acts=`<div class="card-actions">
      <button class="act-btn" onclick="doClosed(${d.id})"><i class="ti ti-trophy"></i> Close deal</button>
      <button class="act-btn" onclick="openModal(${d.id})"><i class="ti ti-edit"></i> Edit</button>
    </div>`;
  }
  return `<div class="${cls}">
    <div class="card-row1"><div><div class="card-company">${d.company}</div><div class="card-contact">${d.contact||'—'}</div></div>${badge}</div>
    ${d.notes?`<div class="card-notes">${d.notes}</div>`:''}
    <div class="card-meta">
      ${d.service?`<span class="meta"><i class="ti ti-briefcase"></i>${d.service}</span>`:''}
      <span class="meta"><i class="ti ti-calendar"></i>${dl}</span>
      <a class="gh-link" href="https://github.com/${OWNER}/${REPO}/issues/${d.ghNumber}" target="_blank"><i class="ti ti-brand-github"></i>#${d.ghNumber}</a>
    </div>
    ${acts}
  </div>`;
}

function render(){
  const pending=deals.filter(d=>d.status==='pending').sort((a,b)=>daysUntil(a.dueDate)-daysUntil(b.dueDate));
  const recv=deals.filter(d=>d.status==='quote-received');
  const closed=deals.filter(d=>d.status==='closed');
  const overdue=pending.filter(d=>daysUntil(d.dueDate)<0).length;
  const soon=pending.filter(d=>{const n=daysUntil(d.dueDate);return n>=0&&n<=3;}).length;
  document.getElementById('s-total').textContent=deals.length;
  document.getElementById('s-overdue').textContent=overdue;
  document.getElementById('s-soon').textContent=soon;
  document.getElementById('s-recv').textContent=recv.length;
  document.getElementById('c-pending').textContent=pending.length;
  document.getElementById('c-recv').textContent=recv.length;
  document.getElementById('c-closed').textContent=closed.length;
  document.getElementById('col-pending').innerHTML=pending.map(renderCard).join('')||'<div class="empty">No pending deals</div>';
  document.getElementById('col-recv').innerHTML=recv.map(renderCard).join('')||'<div class="empty">None yet</div>';
  document.getElementById('col-closed').innerHTML=closed.map(renderCard).join('')||'<div class="empty">None yet</div>';
}

function openModal(id){
  editingId=id;
  const d=id?deals.find(x=>x.id===id):null;
  document.getElementById('overlay').className='overlay open';
  document.getElementById('modal-box').innerHTML=`
    <h2>${d?'Edit deal':'Add new deal'}</h2>
    <div class="field"><label>Company name *</label><input id="f-co" value="${d?d.company:''}" placeholder="e.g. Allianz Technology"/></div>
    <div class="field"><label>Contact name *</label><input id="f-ct" value="${d?d.contact:''}" placeholder="e.g. Sarah Mueller"/></div>
    <div class="field"><label>Contact email</label><input id="f-em" value="${d?d.email:''}" placeholder="sarah@allianz.com"/></div>
    <div class="field"><label>Service type</label><select id="f-sv">
      <option${d&&d.service==='ITAD'?' selected':''}>ITAD</option>
      <option${d&&d.service==='TPM'?' selected':''}>TPM</option>
      <option${d&&d.service==='DaaS'?' selected':''}>DaaS</option>
      <option${d&&d.service==='Hardware Buyback'?' selected':''}>Hardware Buyback</option>
    </select></div>
    <div class="field"><label>Quote due date</label><input type="date" id="f-dt" value="${d?d.dueDate:''}"/></div>
    <div class="field"><label>Notes</label><textarea id="f-nt" rows="2" placeholder="Optional notes...">${d?d.notes:''}</textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveModal()"><i class="ti ti-brand-github"></i> Save to GitHub</button>
    </div>`;
}

function closeModal(){document.getElementById('overlay').className='overlay';}

async function saveModal(){
  const co=document.getElementById('f-co').value.trim();
  const ct=document.getElementById('f-ct').value.trim();
  if(!co||!ct){alert('Company and contact name are required.');return;}
  const deal={company:co,contact:ct,email:document.getElementById('f-em').value.trim(),service:document.getElementById('f-sv').value,dueDate:document.getElementById('f-dt').value,notes:document.getElementById('f-nt').value.trim()};
  closeModal();
  setStatusPill('Saving...');
  try{
    if(editingId){
      const d=deals.find(x=>x.id===editingId);
      Object.assign(d,deal);
      await updateIssue(d.ghNumber,d);
      showToast('Deal updated on GitHub','success');
    }else{
      const nd=await createDeal(deal);
      deals.push(nd);
      showToast('Deal saved — Issue #'+nd.ghNumber+' created','success');
    }
    render();
    setStatusPill('Connected to '+OWNER+'/'+REPO,'connected');
  }catch(e){setStatusPill('Error: '+e.message,'error');showToast(e.message,'error');}
}

async function doReceived(id){
  const d=deals.find(x=>x.id===id);
  setStatusPill('Updating...');
  try{await setStatus(d.ghNumber,'quote-received');d.status='quote-received';render();showToast('Marked as quote received','success');setStatusPill('Connected to '+OWNER+'/'+REPO,'connected');}
  catch(e){setStatusPill('Error','error');showToast(e.message,'error');}
}

async function doClosed(id){
  const d=deals.find(x=>x.id===id);
  setStatusPill('Updating...');
  try{await setStatus(d.ghNumber,'closed');d.status='closed';render();showToast('Deal closed','success');setStatusPill('Connected to '+OWNER+'/'+REPO,'connected');}
  catch(e){setStatusPill('Error','error');showToast(e.message,'error');}
}

async function doRefresh(){
  setStatusPill('Syncing...');
  try{deals=await loadDeals();render();showToast('Synced from GitHub','success');setStatusPill('Connected to '+OWNER+'/'+REPO,'connected');}
  catch(e){setStatusPill('Error','error');showToast(e.message,'error');}
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

(async()=>{
  try{
    await ensureLabels();
    deals=await loadDeals();
    render();
    setStatusPill('Connected to '+OWNER+'/'+REPO,'connected');
  }catch(e){
    setStatusPill('Connection failed: '+e.message,'error');
  }
})();
</script>
</body>
</html>
